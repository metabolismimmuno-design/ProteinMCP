    url: https://github.com/MacromNex/rfdiffusion2_mcp
    validation_status:
      schema: passed
      smoke: passed
      roundtrip: blocked_backend
      real_case: not_run
      roundtrip_notes: >
        RFdiffusion2 requires PyRosetta (commercial license) + Apptainer SIF container.
        The Modal pip-install approach is fundamentally not viable. Actual inference
        script is rf_diffusion/run_inference.py (not scripts/run_inference.py) and
        must be run via apptainer exec --nv rf_diffusion/exec/bakerlab_rf_diffusion_aa.sif.
        Fix path: use Modal image built from the official SIF or a pre-built Docker
        image that embeds PyRosetta.
